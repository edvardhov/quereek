version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    labels:
      - dependencies
    groups:
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      apollo:
        patterns:
          - '@apollo/*'
          - '@as-integrations/*'
          - '@graphql-*'
          - 'graphql'
          - 'graphql-*'
      radix:
        patterns:
          - '@radix-ui/*'
      dev-dependencies:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
