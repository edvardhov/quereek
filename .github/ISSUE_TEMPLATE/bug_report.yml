name: Bug report
description: Report a problem with Quereek
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please search existing issues
        first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Describe the bug and the actual behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '/learn'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Inspector / console output
      description: Paste any relevant GraphQL operation, response, or console errors.
      render: shell
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, browser, and Node.js version (`node -v`).
      placeholder: macOS 15, Chrome 140, Node 20.18.0
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmation
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
