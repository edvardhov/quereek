"""
A person who can be assigned to tasks.
"""
type User {
  id: ID!
  name: String!
  email: String!
}

"""
A collection of related tasks.
"""
type Project {
  id: ID!
  name: String!
  description: String
  createdAt: String!
  tasks: [Task!]!
}

"""
A unit of work within a project.
"""
type Task {
  id: ID!
  title: String!
  description: String
  status: TaskStatus!
  assignee: User
  project: Project!
  createdAt: String!
}

enum TaskStatus {
  TODO
  IN_PROGRESS
  DONE
}

enum TaskChangeAction {
  CREATED
  UPDATED
  DELETED
}

"""
Payload emitted when a task changes within a project.
"""
type TaskChangeEvent {
  action: TaskChangeAction!
  task: Task
  taskId: ID
  projectId: ID!
}

input CreateProjectInput {
  name: String!
  description: String
}

input CreateTaskInput {
  title: String!
  description: String
  projectId: ID!
  assigneeId: ID
  status: TaskStatus
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  assigneeId: ID
}

type Query {
  users: [User!]!
  projects: [Project!]!
  project(id: ID!): Project
  tasks(projectId: ID, status: TaskStatus): [Task!]!
}

type Mutation {
  createProject(input: CreateProjectInput!): Project!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  moveTask(id: ID!, status: TaskStatus!): Task!
  assignTask(id: ID!, userId: ID): Task!
  deleteTask(id: ID!): Task!
  deleteProject(id: ID!): Project!
}

type Subscription {
  taskChanged(projectId: ID!): TaskChangeEvent!
}
