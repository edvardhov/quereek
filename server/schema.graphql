"""
A person who can be assigned to tasks.
"""
type User {
  id: ID!
  name: String!
  email: String!
}

"""
A collection of related tasks.
"""
type Project {
  id: ID!
  name: String!
  description: String
  createdAt: String!
  tasks: [Task!]!
}

"""
A unit of work within a project.
"""
type Task {
  id: ID!
  title: String!
  description: String
  status: TaskStatus!
  assignee: User
  project: Project!
  createdAt: String!
}

enum TaskStatus {
  TODO
  IN_PROGRESS
  DONE
}

enum TaskChangeAction {
  CREATED
  UPDATED
  DELETED
}

"""
Payload emitted when a task changes within a project.
"""
type TaskChangeEvent {
  action: TaskChangeAction!
  task: Task
  taskId: ID
  projectId: ID!
}

input CreateProjectInput {
  name: String!
  description: String
}

input CreateTaskInput {
  title: String!
  description: String
  projectId: ID!
  assigneeId: ID
  status: TaskStatus
}

input UpdateTaskInput {
  title: String
  description: String
  status: TaskStatus
  assigneeId: ID
}

# ── Learning introspection ──────────────────────────────────────────────
# Raw store types expose the in-memory arrays resolvers read from.
# Unlike Task/Project, these use scalar foreign keys (projectId, assigneeId).

"""
A project row as stored in server/src/store.ts (no nested tasks field).
"""
type RawProject {
  id: ID!
  name: String!
  description: String
  createdAt: String!
}

"""
A task row as stored in server/src/store.ts (scalar FKs, no nested relations).
"""
type RawTask {
  id: ID!
  title: String!
  description: String
  status: TaskStatus!
  projectId: ID!
  assigneeId: ID
  createdAt: String!
}

"""
Full snapshot of the in-memory store — users, projects, and tasks arrays.
"""
type StoreSnapshot {
  users: [User!]!
  projects: [RawProject!]!
  tasks: [RawTask!]!
}

input RawProjectPatch {
  name: String
  description: String
}

input RawTaskPatch {
  title: String
  description: String
  status: TaskStatus
  projectId: ID
  assigneeId: ID
}

input RawUserPatch {
  name: String
  email: String
}

type Query {
  users: [User!]!
  projects: [Project!]!
  project(id: ID!): Project
  tasks(projectId: ID, status: TaskStatus): [Task!]!
  """
  Returns the raw in-memory store. Use this to see exactly where resolvers read data from.
  """
  storeSnapshot: StoreSnapshot!
}

type Mutation {
  createProject(input: CreateProjectInput!): Project!
  createTask(input: CreateTaskInput!): Task!
  updateTask(id: ID!, input: UpdateTaskInput!): Task!
  moveTask(id: ID!, status: TaskStatus!): Task!
  assignTask(id: ID!, userId: ID): Task!
  deleteTask(id: ID!): Task!
  deleteProject(id: ID!): Project!
  """
  Patch a raw task row directly in the store (bypasses domain validation).
  """
  updateRawTask(id: ID!, patch: RawTaskPatch!): RawTask!
  """
  Patch a raw project row directly in the store.
  """
  updateRawProject(id: ID!, patch: RawProjectPatch!): RawProject!
  """
  Patch a raw user row directly in the store.
  """
  updateRawUser(id: ID!, patch: RawUserPatch!): User!
  """
  Reset the store to its initial seed data.
  """
  resetStore: StoreSnapshot!
}

type Subscription {
  taskChanged(projectId: ID!): TaskChangeEvent!
}
